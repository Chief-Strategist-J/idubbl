<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Classic – iDubbl Games</title>
    <link rel="stylesheet" href="./ludo/style.css">
    <style>
        body {
            background: #0d1117;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 18px 12px 28px;
        }
        .ludo-container {
            width: min(100vw, 470px);
            max-width: 470px;
            margin: 0 auto;
            border-radius: 0;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.12);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
        }
        .footer {
            background: transparent;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 14px 16px 18px;
        }
        .active-player {
            color: #e6edf3;
            font-size: 1rem;
            margin: 8px 0 0;
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        .active-player span {
            color: #58a6ff;
        }
        .dice-value {
            color: #f0883e;
            min-width: 56px;
            text-align: center;
        }
        .btn-reset {
            background-color: #21262d;
            color: #e6edf3;
            border: 1px solid #30363d;
            border-radius: 10px;
        }
        .btn-reset:hover {
            background-color: #30363d;
        }
        .btn-dice {
            border-radius: 10px;
        }
        @media (max-width: 520px) {
            body {
                padding: 14px 10px 22px;
            }
            .ludo-container {
                width: min(100vw, 100%);
            }
        }
    </style>
</head>
<body>
    <div class="ludo-container">
        <div class="ludo">
            <div class="player-pieces">
                <div class="player-piece" player-id="P1" piece="0"></div>
                <div class="player-piece" player-id="P1" piece="1"></div>
                <div class="player-piece" player-id="P1" piece="2"></div>
                <div class="player-piece" player-id="P1" piece="3"></div>
                
                <div class="player-piece" player-id="P2" piece="0"></div>
                <div class="player-piece" player-id="P2" piece="1"></div>
                <div class="player-piece" player-id="P2" piece="2"></div>
                <div class="player-piece" player-id="P2" piece="3"></div>
            </div>

            <div class="player-bases">
                <div class="player-base" player-id="P1"></div>
                <div class="player-base" player-id="P2"></div>
            </div>
        </div>
        <div class="footer">
            <div class="row" style="display: flex; align-items: center; justify-content: center; gap: 15px; margin: 10px 0;">
                <div class="dice-wrapper">
                    <div id="dice-btn" class="cube">
                        <!-- Face 1 -->
                        <div class="face front">
                            <span class="dot"></span>
                        </div>
                        <!-- Face 2 -->
                        <div class="face back">
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                        <!-- Face 3 -->
                        <div class="face right">
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                        <!-- Face 4 -->
                        <div class="face left">
                            <div class="column">
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                            <div class="column">
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                        </div>
                        <!-- Face 5 -->
                        <div class="face top">
                            <div class="column">
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                            <div class="column font-middle">
                                <span class="dot"></span>
                            </div>
                            <div class="column">
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                        </div>
                        <!-- Face 6 -->
                        <div class="face bottom">
                            <div class="column">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                            <div class="column">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="dice-value" style="display: none;"></div>
                <button id="reset-btn" class="btn btn-reset">🔄 Reset</button>
            </div>
            <h2 class="active-player">Active Player: <span></span></h2>
        </div>
    </div>

    <script src="./main.js" type="module"></script>
</body>
</html>
