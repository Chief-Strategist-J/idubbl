services:
  # Backend Service
  - type: web
    name: idubbl-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: production
      - key: BETTER_AUTH_URL
        value: https://idubbl-backend.onrender.com
      - key: FRONTEND_URL
        value: https://idubbl-frontend.onrender.com
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false # User will input their MongoDB Atlas URI in the Render dashboard
      - key: RESEND_API_KEY
        sync: false # User will input their Resend API key in the Render dashboard
      - key: TRONGRID_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false

  # Keep-alive: Render free-tier web services spin down after ~15 min of
  # inactivity; the next request then pays a multi-second cold start
  # (measured ~7s) on top of normal latency. Ping /health every 10 min to
  # keep the backend warm.
  - type: cron
    name: idubbl-backend-keepalive
    env: node
    plan: free
    rootDir: backend
    schedule: "*/10 * * * *"
    buildCommand: npm install
    startCommand: node scripts/keepAlive.js

  # Frontend Service (Static Site)
  - type: web
    name: idubbl-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://idubbl-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
