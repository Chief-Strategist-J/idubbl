services:
  # Backend Service
  - type: web
    name: idubbl-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: production
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false # User will input their MongoDB Atlas URI in the Render dashboard

  # Frontend Service (Static Site)
  - type: static
    name: idubbl-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: idubbl-backend
          property: url
